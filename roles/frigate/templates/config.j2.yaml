mqtt:
  enabled: false

tls:
  enabled: false

auth:
  enabled: false

# Object detection isn't needed, so disable it entirely. The tensorrt
# detector no longer works on amd64 (see https://docs.frigate.video/configuration/object_detectors#onnx),
# and ONNX requires manually providing a model, so just fall back to the
# bundled cpu detector and turn detection off everywhere.
detectors:
  cpu:
    type: cpu

detect:
  enabled: false

birdseye:
  mode: continuous

cameras:
  rhea_cam:
    enabled: true
    ffmpeg:
      hwaccel_args: preset-nvidia-h264
      inputs:
        - path: rtsp://{{ frigate_config.username }}:{{ frigate_config.password }}@{{ frigate_config.ip }}:554/cam/realmonitor?channel=1&subtype=0
          roles:
            - record
    
    # TODO: load with onvif tool and create new acount. Theoretically will fix.
    # onvif:
    #   host: {{ frigate_config.ip }}
    #   port: 80
    #   user: {{ frigate_config.username }}
    #   password: {{ frigate_config.password }}
    
    record:
      enabled: true
      retain:
        days: 30
        mode: all

    motion:
      enabled: true
      # Block out the camera timestamp.
      mask: 0.75,0.036,0.971,0.026,0.971,0.099,0.749,0.09

    # No need for silly people alerts
    review:
      alerts:
        labels: []

version: 0.14
